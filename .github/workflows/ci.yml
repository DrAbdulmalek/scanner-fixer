name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint (flake8 + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install linting tools
        run: pip install flake8 bandit
      - name: Run flake8
        run: flake8 . --count --statistics
      - name: Run bandit
        run: bandit -r . -x ./tests,./test -ll

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f setup.py ]; then pip install -e .; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
      - name: Run tests
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ -v --tb=short 2>/dev/null || python -m unittest discover -s tests -v 2>/dev/null || echo "No tests found"
          else
            python -m pytest -v --tb=short 2>/dev/null || python -m unittest discover -v 2>/dev/null || echo "No tests found"
          fi
